# mise configuration - development tools and CLI utilities
# This replaces the binary downloads from chezmoi external

[tools]
# === Programming Languages & Runtimes ===
go = "1.26.2"
node = "24.15.0"
python = "3.14.4"
rust = "stable"                   # Required for Cargo-based tools
uv = "0.11.7"

# === Development Tools ===
"aqua:anthropics/claude-code" = "2.1.112"
"aqua:openai/codex" = "0.118.0"
direnv = "2.37.1"                # Environment variable management
github-cli = "2.90.0"
"aqua:hadolint/hadolint" = "2.14.0" # Dockerfile linter
helm = "4.1.4"
kubectl = "1.35.4"
"aqua:argoproj/argo-cd" = "3.3.7"
"aqua:aws/aws-cli" = "2.34.31"
"pipx:linode-cli" = "5.66.0"
"aqua:go-task/task" = "3.50.0"
terraform = "1.14.8"
yq = "4.52.5"                    # YAML processor

# === CLI Utilities ===
"aqua:FiloSottile/age" = "1.3.1"                 # File encryption
"aqua:sharkdp/bat" = "0.26.1"                    # Better cat
"cargo:eza" = "0.23.4"                            # Better ls
"aqua:sharkdp/fd" = "10.4.2"                     # Better find
"aqua:junegunn/fzf" = "0.71.0"                  # Fuzzy finder (junegunn originally, now mirrors exist)
"aqua:dundee/gdu" = "5.35.0"                     # Disk usage analyzer
"aqua:sharkdp/hexyl" = "0.17.0"                  # Hex viewer
"aqua:sharkdp/hyperfine" = "1.20.0"              # Benchmarking tool
"aqua:sharkdp/numbat" = "1.23.0"                 # Calculator
"aqua:BurntSushi/ripgrep" = "15.1.0"             # Better grep
"aqua:starship/starship" = "1.24.2"              # Shell prompt
"aqua:aquasecurity/trivy" = "0.70.0"             # Security scanner
"aqua:ajeetdsouza/zoxide" = "0.9.9"              # Better cd
"aqua:twpayne/chezmoi" = "2.70.1"
"pipx:httpie" = "3.2.4"  # Better curl


# === Build & CI Tools ===
"pipx:black" = "26.3.1"          # Python formatter
"pipx:pre-commit" = "4.5.1"      # Git hook framework
"pipx:yamllint" = "1.38.0"       # YAML linter

# === NPM Global Tools ===


[settings]
always_keep_download = true
paranoid = false

# Use specific plugin repositories if needed
[plugins]
# Custom plugins can be specified here
